services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    env_file:
      - .env.production
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cms_network

  mongo:
    image: mongo:6.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  cms_network:
    driver: bridge

volumes:
  mongodb_data:
